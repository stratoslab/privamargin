name = "privamargin-ltv-monitor"
account_id = "325f8b322c30ee0f5460cfdaef82ecf5"
main = "ltv-monitor.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[[workflows]]
name = "ltv-monitor-workflow"
binding = "LTV_MONITOR_WORKFLOW"
class_name = "LTVMonitorWorkflow"

[triggers]
crons = ["* * * * *"]

[[kv_namespaces]]
binding = "PRIVAMARGIN_CONFIG"
id = "7c64523d0f71497183bd9a20295df71a"

[vars]
CANTON_HOST = "p2-json.cantondefi.com"
PACKAGE_ID = "04e4abfad9464293823d9f7d6c0d4373ce4ddfbb7abe92bfbf06c87a9a733a53"
COINMARKETCAP_API_KEY = "441479ed834c4782a04e48d0cb2c2160"

# EVM RPC endpoints
RPC_SEPOLIA = "https://ethereum-sepolia-rpc.publicnode.com"
RPC_BASE_SEPOLIA = "https://base-sepolia-rpc.publicnode.com"
RPC_ETHEREUM = "https://ethereum-rpc.publicnode.com"
RPC_BASE = "https://base-rpc.publicnode.com"
NETWORK_MODE = "testnet"

# Splice/Canton custodian config
SPLICE_HOST = "p1.cantondefi.com"
SPLICE_PORT = "443"
CANTON_AUTH_AUDIENCE = "https://canton.network.global"
CUSTODIAN_USER = "vault-custodian"

# Canton USDC transfer (custodian → broker via JSON API v2)
# USDC_TEMPLATE_ID must match the USDCHolding Daml template on your Canton participant
# SPLICE_ADMIN_USER is the admin user that has actAs rights on the custodian party
SPLICE_ADMIN_USER = "app-user"
# USDC_TEMPLATE_ID = ""  # Set after deploying USDCHolding DAR

# Secrets (set via `wrangler secret put`):
# - CANTON_AUTH_TOKEN
# - OPERATOR_PARTY
# - DEPLOYER_PRIVATE_KEY
# - CANTON_AUTH_SECRET
